interface:
  display_name: "Reviewer"
  short_description: "Run a two-pass code review and save the result under $PWD/docs/notes"
  default_prompt: "Use $reviewer to review the current changes, or a feature or code area, in two passes: first find concrete issues, then check intent, security, regression risk, tests, operations, and AI readability. Before reviewing, always inspect prior review artifacts for the same target and use them as the deduplication baseline. Save the review as a markdown note under $PWD/docs/notes with a yyyy-MM-dd filename prefix, continue the same-target filename series when one exists, and only emit net-new findings or material status changes instead of repeating older findings."
