interface:
  display_name: "Supervisor"
  short_description: "Supervise the full workflow across investigator, resolver, specifier, planner, reviewer, pathfinder, and recapper, with resume support from existing workspace state"
  default_prompt: "Use $supervisor to orchestrate this repository workflow end-to-end. If the workspace already contains relevant artifacts or uncommitted changes, first infer the current phase and resume or interrupt from there instead of restarting blindly. Otherwise start from investigator, optionally run resolver and specifier, create and execute an ExecPlan with planner, then run reviewer, implement fixes for blocking findings, and if a fix implementation changes the repository update the active ExecPlan to record that work before rerunning reviewer until those blocking findings are resolved. Run pathfinder exactly once on the final post-fix state, and finish with recapper exactly once as the last phase. Use a separate subagent for each phase when available."
