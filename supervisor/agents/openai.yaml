interface:
  display_name: "Supervisor"
  short_description: "Supervise the full workflow across investigator, resolver, specifier, planner, reviewer, pathfinder, and recapper, with resume support from existing workspace state"
  default_prompt: "Use $supervisor to orchestrate this repository workflow end-to-end. If the workspace already contains relevant artifacts or uncommitted changes, first infer the current phase and resume or interrupt from there instead of restarting blindly. Otherwise start from investigator, optionally run resolver and specifier, create and execute an ExecPlan with planner, then run reviewer against the implementation diff. If that first review is clean, proceed directly to pathfinder. If reviewer finds blocking issues, implement only those fixes, update the active ExecPlan when the fix pass changes the repository, and rerun reviewer only when the fix pass changed code, tests, or runtime configuration in scope. Do not rerun reviewer against the full dirty tree or just to reconfirm a clean review. Run pathfinder exactly once on the final post-fix state, and finish with recapper exactly once as the last phase. Use a separate subagent for each phase when available."
