interface:
  display_name: "dev-orchestrate"
  short_description: "Orchestrate the full workflow across dev-investigate through dev-recap, and reopen completed workstreams in follow-up mode with dev-followup when later narrow changes arrive"
  default_prompt: "Use $dev-orchestrate to orchestrate this repository workflow end-to-end. Accept `execution_mode=auto|local|subagents` and equivalent natural-language instructions. Document canonical execution-mode intents in English, but interpret equivalent phrasing in the user's language semantically rather than by exact trigger phrase. Treat phrases such as `no subagents`, `run locally`, `main thread only`, and `do this without delegation` as representative signals for `local`, and phrases such as `use subagents`, `delegate each phase`, `run this with subagents`, and `use the normal delegated flow` as representative signals for `subagents`. Treat vague phrases such as `keep it simple`, `just do it`, `go ahead`, or `use the usual approach` as insufficient on their own. If the user's wording suggests an execution-style preference but does not clearly resolve to `local` or `subagents`, ask one short clarification question before switching modes. If the user does not specify a mode, default to `auto`. Briefly state the resolved execution mode near the start of the run. If the workspace already contains relevant artifacts or uncommitted changes, first infer the current phase, completed-cycle state, or follow-up state instead of restarting blindly. For a new or in-progress workstream, run the normal sequence from dev-investigate through dev-recap. When a completed workstream later receives narrow same-workstream changes, reopen it in follow-up mode, keep the existing ExecPlan as the active plan, run any needed narrow review or fix loop, then use $dev-followup to synchronize the plan and only the downstream artifacts justified by the follow-up propagation rules. Keep the workflow order, artifact contract, and review rigor the same across execution modes; only change whether each phase runs via subagent or locally in the main thread."
