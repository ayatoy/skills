interface:
  display_name: "dev-orchestrate"
  short_description: "Autonomous implementation loop with compact planning and review gates"
  default_prompt: "Use $dev-orchestrate to take this repository task from intake through focused recon, compact planning, implementation, review, and validation with minimal human intervention. Default to the local-first lightweight flow, create a compact execution brief when useful, and escalate to $dev-investigate, $dev-spec, $dev-plan, $dev-followup, $dev-walkthrough, or $dev-recap only when task risk, ambiguity, or handoff needs justify the extra ceremony. If the accepted design introduces or changes an architecture-level decision, create or update an ADR under $PWD/docs/adr with the same UTC filename-prefix rule used by the other workflow artifacts."
