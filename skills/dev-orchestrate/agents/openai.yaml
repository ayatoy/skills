interface:
  display_name: "dev-orchestrate"
  short_description: "Orchestrate the full workflow across dev-investigate, dev-resolve, dev-spec, dev-plan, dev-review, dev-walkthrough, and dev-recap, with resume support from existing workspace state"
  default_prompt: "Use $dev-orchestrate to orchestrate this repository workflow end-to-end. Accept `execution_mode=auto|local|subagents` and equivalent natural-language instructions. Document canonical execution-mode intents in English, but interpret equivalent phrasing in the user's language semantically rather than by exact trigger phrase. Treat phrases such as `no subagents`, `run locally`, `main thread only`, and `do this without delegation` as representative signals for `local`, and phrases such as `use subagents`, `delegate each phase`, `run this with subagents`, and `use the normal delegated flow` as representative signals for `subagents`. Treat vague phrases such as `keep it simple`, `just do it`, `go ahead`, or `use the usual approach` as insufficient on their own. If the user's wording suggests an execution-style preference but does not clearly resolve to `local` or `subagents`, ask one short clarification question before switching modes. If the user does not specify a mode, default to `auto`. Briefly state the resolved execution mode near the start of the run. If the workspace already contains relevant artifacts or uncommitted changes, first infer the current phase and resume or interrupt from there instead of restarting blindly. Otherwise start from dev-investigate, optionally run dev-resolve and dev-spec, create and execute an ExecPlan with dev-plan, then run dev-review against the implementation diff. If that first review is clean, proceed directly to dev-walkthrough. If dev-review finds blocking issues, implement only those fixes, update the active ExecPlan when the fix pass changes the repository, and rerun dev-review only when the fix pass changed code, tests, or runtime configuration in scope. Do not rerun dev-review against the full dirty tree or just to reconfirm a clean review. Keep the workflow order, artifact contract, and review rigor the same across execution modes; only change whether each phase runs via subagent or locally in the main thread. Run dev-walkthrough exactly once on the final post-fix state, and finish with dev-recap exactly once as the last phase."
