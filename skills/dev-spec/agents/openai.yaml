interface:
  display_name: "dev-spec"
  short_description: "Draft a specification from a dev-investigate report or request and save it to $PWD/docs/specs"
  default_prompt: "Use $dev-spec to draft a specification only when the requirement boundary needs to be stabilized or explicitly documented before implementation. Save the result under $PWD/docs/specs with a UTC yyyy-MM-dd'T'HH-mm-ss'Z' filename prefix, and use the same UTC format for any created or updated timestamp written inside the artifact."
