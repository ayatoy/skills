interface:
  display_name: "dev-planner"
  short_description: "Create, revise, and execute ExecPlans in $PWD/docs/plans"
  default_prompt: "Use $dev-planner to create, update, or execute an ExecPlan for this repository following references/PLANS.md. Accept free-form requests, dev-investigator/dev-specifier documents, or an existing ExecPlan, and keep plan files under $PWD/docs/plans with a UTC yyyy-MM-dd'T'HH-mm-ss'Z' filename prefix. Use the same UTC format for any created or updated timestamp written inside the artifact."
