interface:
  display_name: "dev-recap"
  short_description: "Summarize the current session into $PWD/docs/recaps, analyze repeated work patterns, and recommend Agent Skills"
  default_prompt: "Use $dev-recap to summarize the current session so far into a detailed note under $PWD/docs/recaps with a UTC yyyy-MM-dd'T'HH-mm-ss'Z' filename prefix. If a recap note for the same active session or workstream already exists, update and reorganize that note instead of creating a duplicate. Append an analysis of repeated work patterns observed in the session, and recommend any recurring patterns that should become Agent Skills. Use the same UTC format for any created or updated timestamp written inside the artifact."
