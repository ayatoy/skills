interface:
  display_name: "dev-brainstorm"
  short_description: "Turn free-form discussion into an inbox brief for dev-orchestrate or dev-investigate under $PWD/docs/inbox"
  default_prompt: "Use $dev-brainstorm to start a free-form brainstorming conversation from the given input or the current session, create or update a canonical inbox note under $PWD/docs/inbox with a UTC yyyy-MM-dd'T'HH-mm-ss'Z' filename prefix, and keep distilling the discussion into an abstract, concept-oriented brief for what the user wants to do next. Prefer preserving problem shape, concepts, tensions, and open questions over concrete next steps or specific references. Stay in brainstorming mode until the user gives an explicit transition signal, interpret transition intent semantically across the user's language rather than by exact phrase match, do not auto-exit based on momentum or completeness, and do not invoke dev-orchestrate or downstream workflow skills or jump into implementation during the brainstorming run. Use the same UTC format for any created or updated timestamp written inside the artifact."
