interface:
  display_name: "Brainstormer"
  short_description: "Turn free-form discussion into an inbox brief for supervisor or investigator under $PWD/docs/inbox"
  default_prompt: "Use $brainstormer to start a free-form brainstorming conversation from the given input or the current session, create or update a canonical inbox note under $PWD/docs/inbox with a yyyy-MM-dd filename prefix, and keep distilling the discussion into an abstract, concept-oriented brief for what the user wants to do next. Prefer preserving problem shape, concepts, tensions, and open questions over concrete next steps or specific references. Stay in brainstorming mode until the user gives an explicit transition signal, interpret transition intent semantically across the user's language rather than by exact phrase match, do not auto-exit based on momentum or completeness, and do not invoke supervisor or downstream workflow skills or jump into implementation during the brainstorming run."
